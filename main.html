<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>
body{
    margin:0;
    height:100dvh;
    background:url('ls.jpg') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:monospace;
    color:#00ff00;
}

button {
    position: relative;
    padding: 7px 12px;      /* кішірек батырма */
    font-size: 10px;         /* кіші қаріп */
    font-weight: bold;
    background: black;
    color: #feffff;
    border: 1px solid #00ffcc31; /* жұқа шекара */
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;      /* тарылып қаріп аралығы */
    overflow: hidden;
}

/* Glow эффект */
button:hover {
    color: #000;
    background: #ff0022;
    box-shadow: 0 0 5px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
}

/* Glitch эффект */
button::before, 
button::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    width: 100%;
    color: #00ffcc;
    background: black;
    overflow: hidden;
}

button::before {
    top: -1px;
    text-shadow: -1px 0 red;
    animation: glitch 2s infinite linear alternate-reverse;
}

button::after {
    top: 1px;
    text-shadow: -1px 0 blue;
    animation: glitch 1.5s infinite linear alternate-reverse;
}

@keyframes glitch {
    0% { clip-path: inset(0 0 80% 0); }
    20% { clip-path: inset(10% 0 60% 0); }
    40% { clip-path: inset(30% 0 40% 0); }
    60% { clip-path: inset(50% 0 20% 0); }
    80% { clip-path: inset(70% 0 10% 0); }
    100% { clip-path: inset(90% 0 0 0); }
}

/* CHAT */
#chatUI{
    display:none;
    width:100%;
}

#chat{
    height:85vh;
    overflow-y:auto;
    padding:10px;
}

input{
    width:100%;
    padding:15px;
    background:black;
    color:#00ff00;
    border:none;
}

</style>
</head>

<body>

    <div id="start" style="position: relative; width: 222px; margin: 50px auto; text-align: center; color: #0f0; font-family: monospace;">
        <div id="matrix-effect" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
    
        <!-- flex контейнер nickname және батырма үшін -->
        <div style="display:flex; gap:5px; justify-content:center; align-items:center; position: relative; z-index:2;">
            <input id="username" placeholder="nickname..." style="padding:5px; text-align: center; background:rgba(0, 0, 0, 0.521); color:#ffffff; border:1px solid #00ffcc1a;">
            <button onclick="enter()">&</button>
        </div>
    </div>
    <script>
    const effectDiv = document.getElementById('matrix-effect');
    const chars = '01';
    const interval = 50;
    
    function createChar() {
        const span = document.createElement('span');
        span.style.position = 'absolute';
        span.style.top = '0px';
        span.style.left = Math.random() * 100 + '%';
        span.style.color = '#0f0';
        span.style.fontSize = (Math.random() * 2 + 6) + 'px';
        span.textContent = chars[Math.floor(Math.random() * chars.length)];
        effectDiv.appendChild(span);
    
        const speed = Math.random() * 2 + 1;
        function fall() {
            const top = parseFloat(span.style.top);
            if (top > effectDiv.offsetHeight) {
                span.remove();
            } else {
                span.style.top = top + speed + 'px';
                requestAnimationFrame(fall);
            }
        }
        fall();
    }
    
    setInterval(createChar, interval);
    
    function enter() {
        document.getElementById('start').style.display = 'none';
    }
    </script>
<div id="chatUI">
    <div id="chat"></div>
    <input id="msg" placeholder="chat...">
</div>

<audio id="music" src="audio.mp3" loop></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔑 Firebase CONFIG
const firebaseConfig = {
  apiKey: "BO5gnIJmy5KfTmlzOIWyCyR0eiD5wK9EozMCQXTCaMGIWOWA0dC1DbrhS8MGZNPQJpixSWTuna0VCh8am4dpXTk", 
  authDomain: "octopus-chat-7a4fa.firebaseapp.com",
  databaseURL: "https://octopus-chat-7a4fa-default-rtdb.firebaseio.com",
  projectId: "octopus-chat-7a4fa",
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("chat");

const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const music = document.getElementById("music");
let user = "";

// ENTER батырмасы
function enter(){
    const nameInput = document.getElementById("username").value.trim();
    // Егер ат енгізілмесе, рандом аты тағайындаймыз
    user = nameInput !== "" ? nameInput : "anon_" + Math.floor(Math.random()*9999);
    document.getElementById("start").style.display="none";
    document.getElementById("chatUI").style.display="block";
    music.play();
}

// IP алу функциясы
async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
    } catch (err) {
        console.log("IP алу мүмкін болмады:", err);
        return "unknown";
    }
}

// Хабарлама жіберу
input.addEventListener("keydown", async e=>{
    if(e.key==="Enter" && input.value.trim()!==""){
        const ip = await getIP(); // IP алу, бірақ қолданушы көрмейді
        db.push({
            user: user,       // ENTER батырмасынан кейін таңдалған ат немесе рандом
            text: input.value,
            ip: ip,
            time: Date.now()
        });
        input.value="";
    }
});

// Хабарламаларды алу
db.on("child_added", d=>{
    const m=d.val();
    // Тек пайдаланушы аты мен хабарламаны көрсетеміз
    chat.innerHTML += `<div><b>${m.user}:</b> ${m.text}</div>`;
    chat.scrollTop=chat.scrollHeight;
});
</script>

</body>
</html>
