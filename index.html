<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booting...</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff00;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100dvh;
}

.terminal{
    width:90%;
    max-width:700px;
}

</style>
</head>

<body>

<div class="terminal" id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

function randomIP(){
    return Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
}

function type(text, speed=30){
    return new Promise(res=>{
        let i=0;
        function t(){
            if(i<text.length){
                terminal.innerHTML += text[i];
                i++;
                setTimeout(t,speed);
            } else {
                terminal.innerHTML += "<br>";
                res();
            }
        }
        t();
    });
}

async function start(){
    await type("Initializing anonymous system...");
    await type("Connecting to secure network...");
    await type("Fetching real IP...");

    let ip="unknown";
    try{
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        ip=d.ip;
    }catch(e){}

    await type("REAL IP DETECTED: "+ip);
    await type("Masking identity...");
    await type("Switching IP...");

    let fake = randomIP();
    await type("NEW IP: "+fake);

    await type("Connecting to TOR nodes...");
    await type("ACCESS GRANTED ✔");
    await type("Redirecting...");

    setTimeout(()=>{
        window.location.href="main.html";
    },1000);
}

start();
</script>

</body>
</html>
